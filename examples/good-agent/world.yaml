world:
  version: "1.0"
  description: Customer support world model

entities:
  - name: Order
    fields:
      - order_id: string
      - customer_id: string
      - amount: number
      - created_at: datetime

  - name: Refund
    fields:
      - refund_id: string
      - order_id: string
      - amount: number
      - requested_at: datetime

  - name: Customer
    fields:
      - customer_id: string
      - email: string
      - tier: enum [standard, premium, vip]

states:
  Order:
    - PENDING
    - CONFIRMED
    - SHIPPED
    - DELIVERED
    - CANCELLED
    - REFUNDED

  Refund:
    - REQUESTED
    - UNDER_REVIEW
    - APPROVED
    - DENIED
    - PROCESSED

transitions:
  - name: request_refund
    entity: Order
    from_state: DELIVERED
    to_state: REFUNDED
    requires:
      - refund.state == APPROVED
      - days_since_delivery <= 30
    emits: refund_requested_event

  - name: approve_refund
    entity: Refund
    from_state: UNDER_REVIEW
    to_state: APPROVED
    requires:
      - approver_role in [senior_agent, manager]
    emits: refund_approved_event

  - name: deny_refund
    entity: Refund
    from_state: UNDER_REVIEW
    to_state: DENIED
    requires:
      - approver_role in [senior_agent, manager]
    emits: refund_denied_event

  - name: cancel_order
    entity: Order
    from_state: PENDING
    to_state: CANCELLED
    requires:
      - order.state == PENDING
    emits: order_cancelled_event

constraints:
  - id: C001
    description: Refunds over $500 require manager approval
    guard: "refund.amount > 500 => approver_role == manager"
    on_fail: ESCALATE

  - id: C002
    description: Refunds after 30 days are denied
    guard: "days_since_delivery > 30 => DENY"
    on_fail: DENY

  - id: C003
    description: Only DELIVERED orders are eligible for refund
    guard: "order.state != DELIVERED => DENY"
    on_fail: DENY

ssot:
  canonical_state: orders_db
  description: The orders database is the single source of truth for all order and refund state.
